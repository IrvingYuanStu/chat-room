version: '3.8'

services:
  chat-room:
    build: .
    container_name: chat-room-app
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=production
      - ZK_ADDRESS=${ZK_ADDRESS:-127.0.0.1:2181}
    volumes:
      - ./config:/app/.chat-room
    restart: unless-stopped
    network_mode: host  # 使用 host 网络模式以便连接本地 ZooKeeper
